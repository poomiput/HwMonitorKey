; =============================================================================
; PlatformIO Configuration: Wireless USB HID Keyboard Bridge
; =============================================================================
; Two environments for two ESP32-S3 DevKitC-1 boards:
;   1) host_tx   — USB Host reads keyboard, sends HID reports via ESP-NOW
;   2) device_rx — USB Device HID forwards to PC + Web Monitor via WebSocket
; =============================================================================

; --- Shared settings for both boards ---
[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; =============================================================================
; ENV 1: HOST / TRANSMITTER — USB Host + ESP-NOW Sender
; =============================================================================
[env:host_tx]
; USB OTG mode (not CDC) — required for USB Host functionality
build_flags =
    -DBOARD_HOST_TX
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
; Only compile host_main.cpp (exclude device_main.cpp)
build_src_filter =
    +<shared_protocol.h>
    +<host_main.cpp>
    -<device_main.cpp>
lib_deps =
    https://github.com/tobozo/EspUsbHost.git

; =============================================================================
; ENV 2: DEVICE / RECEIVER — USB Device HID + ESP-NOW + Web Monitor
; =============================================================================
[env:device_rx]
; USB OTG mode with CDC on boot for serial debug
build_flags =
    -DBOARD_DEVICE_RX
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
; Only compile device_main.cpp (exclude host_main.cpp)
build_src_filter =
    +<shared_protocol.h>
    +<device_main.cpp>
    +<hid_keyboard*.cpp>
    -<host_main.cpp>
lib_deps =
    links2004/WebSockets @ ^2.4.0
    https://github.com/wakwak-koba/ESP32-NimBLE-Keyboard.git
